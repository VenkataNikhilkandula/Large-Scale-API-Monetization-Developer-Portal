server:
  port: 8080

spring:
  application:
    name: api-monetization-portal
  
  datasource:
    url: jdbc:mysql://localhost:3306/api_portal?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 500ms
      connect-timeout: 500ms

  kafka:
    bootstrap-servers: localhost:9092
    admin:
      fail-fast: false   # Do NOT crash if Kafka is unavailable on startup
    listener:
      missing-topics-fatal: false  # Don't fail if topic doesn't exist yet
      auto-startup: false           # Don't start consumer listener on boot (no Kafka)
    consumer:
      group-id: api-portal-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

jwt:
  secret: 9a4f2c8d3e5b1a6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c
  expiration: 86400000 # 24 hours

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
